<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Portal TI</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">

<style>

body{
background:#0f172a;
font-family:Arial;
color:#e5e7eb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#020617;
padding:25px;
border-radius:14px;
width:480px;
box-shadow:0 0 25px rgba(0,0,0,.6);
}

h1{
text-align:center;
font-size:18px;
margin-bottom:8px;
}

small{
display:block;
text-align:center;
color:#94a3b8;
margin-bottom:20px;
}

.tabs{
display:flex;
gap:8px;
margin-bottom:20px;
}

.tab{
flex:1;
padding:8px;
border-radius:8px;
background:#020617;
border:1px solid #334155;
cursor:pointer;
text-align:center;
font-size:13px;
}

.tab.active{
background:#22c55e;
color:black;
}

.section{
display:none;
}

.section.active{
display:block;
}

label{
margin-top:14px;
display:block;
font-size:14px;
}

select,input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #334155;
background:#020617;
color:#e5e7eb;
font-size:14px;
}

.preview{
margin-top:22px;
padding:14px;
background:black;
color:#22c55e;
font-family:Consolas;
text-align:center;
border-radius:8px;
font-size:16px;
}

button{
margin-top:18px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
}

.switchBox{
margin-top:16px;
display:flex;
align-items:center;
justify-content:space-between;
}

.switch{
position:relative;
display:inline-block;
width:52px;
height:26px;
}

.switch input{display:none;}

.slider{
position:absolute;
cursor:pointer;
background-color:#475569;
border-radius:34px;
top:0;
left:0;
right:0;
bottom:0;
transition:.3s;
}

.slider:before{
position:absolute;
content:"";
height:20px;
width:20px;
left:3px;
bottom:3px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background-color:#22c55e;
}

input:checked + .slider:before{
transform:translateX(26px);
}

.modeLabel{
font-size:13px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="card">

<h1>Portal de Herramientas TI</h1>
<small>Mesa de Servicios</small>

<div class="tabs">

<div class="tab active" onclick="cambiarTab('generador',this)">Generador</div>
<div class="tab" onclick="cambiarTab('diagnostico',this)">Diagnóstico</div>

</div>

<!-- GENERADOR -->

<div class="section active" id="generador">

<label>Empresa</label>
<select id="empresa">
<option value="">Seleccione</option>
<option value="FLA">GRUPO FLAMINGO</option>
<option value="COL">COLTEFINANCIERA</option>
<option value="CON">CONNSER</option>
<option value="NOV">NOVAFIANZA</option>
<option value="LNK">LINK SEGUROS</option>
<option value="LAT">LATAM</option>
<option value="FOR">FORJANDO</option>
</select>

<label>Área</label>
<select id="area">
<option value="">Seleccione</option>
<option value="PRE">Presidencia</option>
<option value="TI">Tecnología</option>
<option value="DES">Desarrollo</option>
<option value="COM">Comercial</option>
<option value="SAC">Servicio al Cliente</option>
<option value="OPE">Operaciones</option>
<option value="ADM">Administrativa</option>
<option value="FIN">Financiera</option>
<option value="GH">Gestión Humana</option>
<option value="LOG">Logística</option>
</select>

<label>Tipo de Equipo</label>
<select id="tipo">
<option value="">Seleccione</option>
<option value="DT">Desktop</option>
<option value="LP">Laptop</option>
</select>

<label>Serial completo</label>
<input id="serial" placeholder="Ej: ABCD123456XYZ">

<div class="switchBox">

<span class="modeLabel">Primeros 4</span>

<label class="switch">
<input type="checkbox" id="modoSerial" checked>
<span class="slider"></span>
</label>

<span class="modeLabel">Últimos 4</span>

</div>

<div class="preview" id="preview">
El nombre se construirá aquí…
</div>

</div>

<!-- DIAGNOSTICO -->

<div class="section" id="diagnostico">

<label>Nombre del equipo</label>
<input id="equipoDiag" placeholder="Ej: PC123">

<button onclick="descargarDiagnostico()">
Descargar Script Diagnóstico
</button>

</div>

</div>

<script>

function cambiarTab(id,elemento){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
elemento.classList.add("active");

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

}

const empresa=document.getElementById("empresa");
const area=document.getElementById("area");
const tipo=document.getElementById("tipo");
const serial=document.getElementById("serial");
const modoSerial=document.getElementById("modoSerial");
const preview=document.getElementById("preview");

[empresa,area,tipo,serial,modoSerial].forEach(el=>{
el.addEventListener("change",generar);
el.addEventListener("input",generar);
});

function generar(){

let e=empresa.value;
let a=area.value;
let t=tipo.value;
let s=serial.value.replace(/\s/g,"");

let serialFinal="";

if(s.length>=4){

if(modoSerial.checked){
serialFinal=s.slice(-4).toUpperCase();
}else{
serialFinal=s.slice(0,4).toUpperCase();
}

}

let partes=[];

if(e)partes.push(e);
if(t)partes.push(t);
if(a)partes.push(a);
if(serialFinal)partes.push(serialFinal);

if(partes.length==0){
preview.innerHTML="El nombre se construirá aquí…";
return;
}

preview.textContent=partes.join("-");

}

function descargarDiagnostico(){

let equipo=document.getElementById("equipoDiag").value;

if(equipo==""){
alert("Ingrese el nombre del equipo");
return;
}

let script=`@echo off
set EQUIPO=${equipo}

echo ============================================
echo    DIAGNOSTICO REMOTO AVANZADO VIA PsExec
echo ============================================
echo.

echo Equipo objetivo: %EQUIPO%

for /f "tokens=1-4 delims=/ " %%a in ("%date%") do (set DD=%%a& set MM=%%b& set YYYY=%%c)
for /f "tokens=1-2 delims=: " %%a in ("%time%") do (set HH=%%a& set MN=%%b)
set HH=%HH: =0%
set FECHA=%YYYY%%MM%%DD%_%HH%%MN%

set RUTA_LOCAL=C:\\Diag_Remoto\\resultados\\%EQUIPO%_%FECHA%
mkdir "%RUTA_LOCAL%"

echo Ejecutando diagnosticos en: %EQUIPO%

psexec \\\\%EQUIPO% cmd /c systeminfo > "%RUTA_LOCAL%\\01_systeminfo.txt"
psexec \\\\%EQUIPO% cmd /c tasklist > "%RUTA_LOCAL%\\02_tasklist.txt"
psexec \\\\%EQUIPO% cmd /c ipconfig /all > "%RUTA_LOCAL%\\03_red.txt"
psexec \\\\%EQUIPO% cmd /c netstat -ano > "%RUTA_LOCAL%\\04_conexiones.txt"
psexec \\\\%EQUIPO% cmd /c query user > "%RUTA_LOCAL%\\05_usuarios.txt"

echo.
echo Diagnostico finalizado
echo Ruta: %RUTA_LOCAL%
pause
`;

let blob=new Blob([script],{type:"text/plain"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="diagnostico-"+equipo+".bat";

link.click();

}

</script>

</body>
</html>
