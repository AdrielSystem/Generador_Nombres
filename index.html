<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Nombre de Equipo</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">

<style>

body {
  background: #0f172a;
  font-family: Arial, sans-serif;
  color: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #020617;
  padding: 25px;
  border-radius: 14px;
  width: 460px;
  box-shadow: 0 0 25px rgba(0,0,0,.6);
}

h1 {
  text-align: center;
  font-size: 18px;
  margin-bottom: 6px;
}

small {
  display: block;
  text-align: center;
  color: #94a3b8;
  margin-bottom: 18px;
}

label {
  margin-top: 14px;
  display: block;
  font-size: 14px;
}

select, input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #020617;
  color: #e5e7eb;
  font-size: 14px;
}

.preview {
  margin-top: 22px;
  padding: 14px;
  background: black;
  color: #22c55e;
  font-family: Consolas, monospace;
  text-align: center;
  border-radius: 8px;
  font-size: 16px;
}

.switchBox{
  margin-top:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.switch {
  position: relative;
  display: inline-block;
  width: 52px;
  height: 26px;
}

.switch input {display:none;}

.slider {
  position: absolute;
  cursor: pointer;
  background-color: #475569;
  border-radius: 34px;
  top:0;
  left:0;
  right:0;
  bottom:0;
  transition:.3s;
}

.slider:before {
  position:absolute;
  content:"";
  height:20px;
  width:20px;
  left:3px;
  bottom:3px;
  background:white;
  border-radius:50%;
  transition:.3s;
}

input:checked + .slider {
  background-color:#22c55e;
}

input:checked + .slider:before {
  transform:translateX(26px);
}

.modeLabel{
  font-size:13px;
  color:#94a3b8;
}

</style>
</head>

<body>

<div class="card">

<h1>Generador de Nombre de Equipo</h1>
<small>No renombra · No une al dominio</small>

<label>Empresa</label>
<select id="empresa">
<option value="">Seleccione</option>
<option value="FLA">GRUPO FLAMINGO</option>
<option value="COL">COLTEFINANCIERA</option>
<option value="CON">CONNSER</option>
<option value="NOV">NOVAFIANZA</option>
<option value="LNK">LINK SEGUROS</option>
<option value="LAT">LATAM</option>
<option value="FOR">FORJANDO</option>
</select>

<label>Área</label>
<select id="area">
<option value="">Seleccione</option>
<option value="PRE">Presidencia</option>
<option value="TI">Tecnología</option>
<option value="DES">Desarrollo</option>
<option value="COM">Comercial</option>
<option value="SAC">Servicio al Cliente</option>
<option value="OPE">Operaciones</option>
<option value="ADM">Administrativa</option>
<option value="FIN">Financiera</option>
<option value="GH">Gestión Humana</option>
<option value="LOG">Logística</option>
</select>

<label>Tipo de Equipo</label>
<select id="tipo">
<option value="">Seleccione</option>
<option value="DT">Desktop</option>
<option value="LP">Laptop</option>
</select>

<label>Serial completo</label>
<input id="serial" placeholder="Ej: ABCD123456XYZ">

<div class="switchBox">

<span class="modeLabel">Primeros 4</span>

<label class="switch">
<input type="checkbox" id="modoSerial" checked>
<span class="slider"></span>
</label>

<span class="modeLabel">Últimos 4</span>

</div>

<div class="preview" id="preview">
El nombre se construirá aquí…
</div>

</div>

<script>

const empresa = document.getElementById("empresa");
const area = document.getElementById("area");
const tipo = document.getElementById("tipo");
const serial = document.getElementById("serial");
const modoSerial = document.getElementById("modoSerial");
const preview = document.getElementById("preview");

[empresa, area, tipo, serial, modoSerial].forEach(el=>{
  el.addEventListener("change", generar);
  el.addEventListener("input", generar);
});

function generar(){

let e = empresa.value;
let a = area.value;
let t = tipo.value;
let s = serial.value.replace(/\s/g,"");

let serialFinal="";

if(s.length>=4){

if(modoSerial.checked){
serialFinal = s.slice(-4).toUpperCase();
}else{
serialFinal = s.slice(0,4).toUpperCase();
}

}

let partes=[];

if(e) partes.push(e);
if(t) partes.push(t);
if(a) partes.push(a);
if(serialFinal) partes.push(serialFinal);

if(partes.length==0){
preview.innerHTML="El nombre se construirá aquí…";
return;
}

let nombre = partes.join("-");

preview.textContent = nombre;

}

</script>

</body>
</html>
