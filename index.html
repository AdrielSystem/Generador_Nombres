<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Portal de Soporte TI</title>

<style>

body{
background:#0f172a;
font-family:Segoe UI;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#020617;
padding:30px;
width:540px;
border-radius:14px;
box-shadow:0 0 30px rgba(0,0,0,.7);
}

h1{
text-align:center;
margin-bottom:15px;
}

.tabs{
display:flex;
gap:8px;
margin-bottom:20px;
}

.tab{
flex:1;
padding:10px;
border-radius:8px;
background:#020617;
border:1px solid #334155;
text-align:center;
cursor:pointer;
}

.tab.active{
background:#22c55e;
color:black;
font-weight:bold;
}

.section{
display:none;
}

.section.active{
display:block;
}

label{
margin-top:10px;
display:block;
font-size:13px;
}

select,input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #334155;
background:#020617;
color:white;
}

.preview{
margin-top:18px;
padding:12px;
background:black;
color:#22c55e;
font-family:Consolas;
text-align:center;
border-radius:8px;
font-size:16px;
}

button{
margin-top:12px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#22c55e;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>

</head>

<body>

<div class="card">

<h1>Portal de Herramientas TI</h1>

<div class="tabs">

<div class="tab active" onclick="tab('generador',this)">
Generador
</div>

<div class="tab" onclick="tab('diagnostico',this)">
Diagnóstico
</div>

</div>

<!-- GENERADOR -->

<div class="section active" id="generador">

<label>Empresa</label>

<select id="empresa">

<option value="">Seleccione</option>
<option value="COL">COLTEFINANCIERA</option>
<option value="FLA">FLAMINGO</option>
<option value="CON">CONNSER</option>

</select>

<label>Tipo</label>

<select id="tipo">

<option value="">Seleccione</option>
<option value="LP">Laptop</option>
<option value="DT">Desktop</option>

</select>

<label>Área</label>

<select id="area">

<option value="">Seleccione</option>
<option value="TI">Tecnología</option>
<option value="COM">Comercial</option>
<option value="OPE">Operaciones</option>

</select>

<label>Serial</label>

<input id="serial" placeholder="Serial del equipo">

<div class="preview" id="preview">

COL-LP-TI-XXXX

</div>

</div>

<!-- DIAGNOSTICO -->

<div class="section" id="diagnostico">

<label>Nombre del equipo</label>

<input id="equipo" placeholder="Ej: COL-LP-TI-7F2A">

<button onclick="descargarDiagnostico()">
Descargar Diagnóstico Remoto
</button>

<button onclick="descargarMonitorLocal()">
Monitor Safetica LOCAL
</button>

<button onclick="descargarMonitorRemoto()">
Monitor Safetica REMOTO
</button>

</div>

</div>

<script>

function tab(id,el){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

const empresa=document.getElementById("empresa")
const tipo=document.getElementById("tipo")
const area=document.getElementById("area")
const serial=document.getElementById("serial")
const preview=document.getElementById("preview")

function generar(){

let e=empresa.value
let t=tipo.value
let a=area.value
let s=serial.value

if(s.length>=4){
s=s.slice(-4).toUpperCase()
}

let nombre=[e,t,a,s].filter(Boolean).join("-")

preview.innerText=nombre

}

empresa.onchange=generar
tipo.onchange=generar
area.onchange=generar
serial.oninput=generar

function descargarDiagnostico(){

let equipo=document.getElementById("equipo").value

if(!equipo){
alert("Ingrese nombre del equipo")
return
}

let contenido=

"@echo off\n"+
"set PC="+equipo+"\n\n"+
"echo ===== DIAGNOSTICO REMOTO =====\n\n"+
"psexec \\\\%PC% systeminfo\n"+
"psexec \\\\%PC% tasklist\n"+
"psexec \\\\%PC% ipconfig /all\n"+
"pause\n"

let blob=new Blob([contenido],{type:"text/plain"})
let link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="diagnostico_"+equipo+".bat"
link.click()

}

function descargarMonitorLocal(){

let contenido=

"@echo off\n"+
":loop\n"+
"cls\n"+
"echo MONITOR SAFETICA LOCAL\n\n"+
"tasklist | findstr /I STCService\n"+
"tasklist | findstr /I STEventService\n"+
"tasklist | findstr /I STContentService\n"+
"tasklist | findstr /I STAService\n"+
"\n"+
"timeout /t 5 >nul\n"+
"goto loop\n"

let blob=new Blob([contenido],{type:"text/plain"})
let link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="monitor_safetica_local.bat"
link.click()

}

function descargarMonitorRemoto(){

let equipo=document.getElementById("equipo").value

if(!equipo){
alert("Ingrese nombre del equipo")
return
}

let contenido=

"@echo off\n"+
"set PC="+equipo+"\n"+
"psexec -accepteula >nul 2>&1\n\n"+
":loop\n"+
"cls\n"+
"echo ==================================\n"+
"echo MONITOR SAFETICA REMOTO\n"+
"echo EQUIPO %PC%\n"+
"echo ==================================\n\n"+
"echo PROCESOS SAFETICA\n\n"+
"psexec \\\\%PC% tasklist /FI \"IMAGENAME eq STCService.exe\"\n"+
"psexec \\\\%PC% tasklist /FI \"IMAGENAME eq STEventService.exe\"\n"+
"psexec \\\\%PC% tasklist /FI \"IMAGENAME eq STContentService.exe\"\n"+
"psexec \\\\%PC% tasklist /FI \"IMAGENAME eq STAService.exe\"\n\n"+
"echo SERVICIOS\n\n"+
"psexec \\\\%PC% sc query STCService | find \"STATE\"\n"+
"psexec \\\\%PC% sc query STEventService | find \"STATE\"\n"+
"psexec \\\\%PC% sc query STContentService | find \"STATE\"\n"+
"psexec \\\\%PC% sc query STAService | find \"STATE\"\n\n"+
"echo DRIVERS\n\n"+
"psexec \\\\%PC% driverquery | findstr /I dc2drv\n"+
"psexec \\\\%PC% driverquery | findstr /I fltenum\n\n"+
"echo Actualizando en 5 segundos...\n"+
"timeout /t 5 >nul\n"+
"goto loop\n"

let blob=new Blob([contenido],{type:"text/plain"})
let link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="monitor_safetica_remoto_"+equipo+".bat"
link.click()

}

</script>

</body>

</html>
