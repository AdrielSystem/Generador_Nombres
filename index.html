<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Portal TI</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:#e5e7eb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#020617;
padding:25px;
border-radius:14px;
width:480px;
box-shadow:0 0 25px rgba(0,0,0,.6);
}

h1{
text-align:center;
font-size:18px;
margin-bottom:8px;
}

.tabs{
display:flex;
gap:8px;
margin-bottom:20px;
}

.tab{
flex:1;
padding:8px;
border-radius:8px;
background:#020617;
border:1px solid #334155;
cursor:pointer;
text-align:center;
}

.tab.active{
background:#22c55e;
color:black;
}

.section{
display:none;
}

.section.active{
display:block;
}

select,input{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #334155;
background:#020617;
color:white;
}

.preview{
margin-top:20px;
padding:14px;
background:black;
color:#22c55e;
font-family:Consolas;
text-align:center;
border-radius:8px;
}

button{
margin-top:15px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#22c55e;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h1>Portal de Herramientas TI</h1>

<div class="tabs">
<div class="tab active" onclick="tab('generador',this)">Generador</div>
<div class="tab" onclick="tab('diagnostico',this)">Diagnóstico</div>
</div>

<!-- GENERADOR -->

<div class="section active" id="generador">

<label>Empresa</label>
<select id="empresa">
<option value="">Seleccione</option>
<option value="COL">COLTEFINANCIERA</option>
<option value="FLA">FLAMINGO</option>
<option value="CON">CONNSER</option>
</select>

<label>Área</label>
<select id="area">
<option value="">Seleccione</option>
<option value="TI">Tecnología</option>
<option value="COM">Comercial</option>
<option value="OPE">Operaciones</option>
</select>

<label>Tipo</label>
<select id="tipo">
<option value="">Seleccione</option>
<option value="LP">Laptop</option>
<option value="DT">Desktop</option>
</select>

<label>Serial</label>
<input id="serial">

<div class="preview" id="preview">
Nombre aquí
</div>

</div>

<!-- DIAGNOSTICO -->

<div class="section" id="diagnostico">

<label>Nombre del equipo</label>
<input id="equipo">

<button onclick="descargarDiagnostico()">
Descargar Diagnóstico Remoto
</button>

<button onclick="descargarMonitor()">
Descargar Monitor Safetica
</button>

</div>

</div>

<script>

function tab(id,el){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

const empresa=document.getElementById("empresa")
const area=document.getElementById("area")
const tipo=document.getElementById("tipo")
const serial=document.getElementById("serial")
const preview=document.getElementById("preview")

function generar(){

let e=empresa.value
let a=area.value
let t=tipo.value
let s=serial.value

if(s.length>=4){
s=s.slice(-4).toUpperCase()
}

let nombre=[e,t,a,s].filter(Boolean).join("-")

preview.innerText=nombre

}

empresa.onchange=generar
area.onchange=generar
tipo.onchange=generar
serial.oninput=generar

function descargarDiagnostico(){

let equipo=document.getElementById("equipo").value

if(!equipo){
alert("Ingrese nombre del equipo")
return
}

let contenido=
"@echo off\n"+
"set EQUIPO="+equipo+"\n\n"+
"echo DIAGNOSTICO REMOTO\n\n"+
"psexec \\\\"+"%EQUIPO% cmd /c systeminfo\n"+
"psexec \\\\"+"%EQUIPO% cmd /c tasklist\n"+
"psexec \\\\"+"%EQUIPO% cmd /c ipconfig /all\n"+
"pause\n"

let blob=new Blob([contenido],{type:"text/plain"})
let link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="diagnostico_"+equipo+".bat"

link.click()

}

function descargarMonitor(){

let contenido=
"$procesos='safetica','safeticaservice'\n"+
"while($true){\n"+
"clear\n"+
"get-process | where {$procesos -contains $_.ProcessName} |\n"+
"select ProcessName,CPU,Id,@{n='RAM_MB';e={[math]::round($_.WorkingSet64/1MB,2)}}\n"+
"start-sleep 2\n"+
"}"

let blob=new Blob([contenido],{type:"text/plain"})
let link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="monitor_safetica.ps1"

link.click()

}

</script>

</body>
</html>
